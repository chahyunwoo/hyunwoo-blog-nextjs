name: Bug Report
description: 버그를 발견하셨나요? 알려주세요.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 어떤 버그인지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현할 수 있는 단계를 알려주세요.
      placeholder: |
        1. '...'로 이동
        2. '...' 클릭
        3. 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 예상 동작
      description: 어떻게 동작해야 한다고 생각하시나요?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷
      description: 스크린샷이 있다면 첨부해주세요.
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: 브라우저
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - 기타
    validations:
      required: false
