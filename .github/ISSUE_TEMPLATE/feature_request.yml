name: Feature Request
description: 새로운 기능을 제안해주세요.
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 어떤 기능을 원하시나요?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 이유
      description: 이 기능이 왜 필요한지 알려주세요.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려해본 다른 방법이 있나요?
    validations:
      required: false
